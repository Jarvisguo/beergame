<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理后台 - 啤酒分销游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-container" id="adminApp">
  <div class="admin-header">
    <h1>管理后台</h1>
    <div class="admin-meta">
      <p class="status" id="adminStatus">游戏尚未开始。</p>
      <div class="alert alert-err" id="gameError" hidden></div>
    </div>
    <div class="toolbar" id="adminToolbar">
      <button class="btn btn-primary" id="btnStartGame">开始游戏</button>
      <button class="btn btn-danger" id="btnEndGame" hidden>结束游戏</button>
      <button class="btn btn-outline" id="btnResetGame" hidden>重置</button>
      <button class="btn btn-outline" id="btnReport">经营报告</button>
    </div>
  </div>

  <div class="admin-settings-bar" id="gameSettings">
    <label class="label" for="demandTrend">客户需求趋势:</label>
    <select class="input input-sm" id="demandTrend" style="width:140px">
      <option value="mixed">混合趋势</option>
      <option value="growth">增长趋势</option>
      <option value="decline">下降趋势</option>
    </select>
    <span class="hint" style="margin:0">订单延迟 1 周，物流延迟 2 周。设置仅在开始游戏时生效。</span>
  </div>

  <div class="admin-layout">
    <div class="admin-left" style="width:100%">
      <div class="panel" id="groupPanel" hidden>
        <div class="panel-head">团队</div>
        <div class="table-wrap">
          <table class="table" id="adminTable">
            <thead><tr>
              <th id="groupRank">团队 #</th>
              <th>零售商</th><th>批发商</th><th>区域仓库</th><th>工厂</th>
              <th class="num-col">总库存</th><th class="num-col">总积压</th>
              <th class="num-col">团队总成本</th><th class="num-col">牛鞭效应</th>
              <th>待下单</th><th></th>
            </tr></thead>
            <tbody id="adminTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="adminLogin">
  <div class="modal-box">
    <div class="modal-header"><h3>请输入管理员密码</h3></div>
    <div class="modal-body">
      <div class="alert alert-err" id="wrongPass" hidden>密码错误，请重试。</div>
      <input type="password" id="passwordInput" class="input" placeholder="密码" enterkeyhint="go">
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary btn-block" id="btnAdmin">登录</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="admin.js"></script>
</body>
</html>
