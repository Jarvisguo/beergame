<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="啤酒分销游戏 - 管理后台">
  <meta name="author" content="Miron Vranjes">

  <title>管理后台 - 啤酒分销游戏</title>

  <link rel="stylesheet" href="./bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="./bootstrap-theme.min.css" crossorigin="anonymous">

  <script src="./jquery.min.js"></script>
  <script src="./bootstrap.min.js" crossorigin="anonymous"></script>
  <script src="./socket.io-1.2.0.js"></script>
  <script type="text/javascript" src="./loader.js"></script>
  <script src="admin.js"></script>
</head>

<body>

  <div class="container">

    <h2>啤酒分销游戏 <small>管理后台</small></h2>

    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header">
          <div class="navbar-brand" id="role">控制面板</div>
          <button type="button" class="btn btn-success navbar-btn" id="btnStartGame">
              <span class="glyphicon glyphicon-ok" aria-hidden="true"></span> 开始游戏
            </button>
          <button type="button" class="btn btn-warning navbar-btn" id="btnEndGame">
              <span class="glyphicon glyphicon-remove" aria-hidden="true"></span> 结束
            </button>
          <button type="button" class="btn btn-primary navbar-btn" id="btnReport" onclick="window.open('report.html', '_blank')">
              <span class="glyphicon glyphicon-print" aria-hidden="true"></span> 经营报告
            </button>
          <button type="button" class="btn btn-danger navbar-btn" id="btnResetGame">
              <span class="glyphicon glyphicon-trash" aria-hidden="true"></span> 重置
            </button>
        </div>
      </div>
    </nav>

    <div class="alert alert-danger collapse" role="alert" id="gameStartError">
      <span class="glyphicon glyphicon-exclamation-sign" aria-hidden="true"></span>
      <span id="errorText">无法开始游戏，请重试。</span>
    </div>

    <p id="status">游戏尚未开始。</p>

    <div class="panel panel-default" id="charts">
      <div class="panel-heading">图表</div>
      <div class="panel-body">
        <div class="row">
          <div class="col-sm-3">
            <form class="form-horizontal">
              <div class="form-group">
                <label for="chartGroup" class="col-sm-6 control-label">团队 #:</label>
                <div class="col-sm-6">
                  <select class="form-control" id="chartGroup">
  <option>1</option>
</select>
                </div>
              </div>
              <div class="form-group">
                <label for="chartType" class="col-sm-6 control-label">类型:</label>
                <div class="col-sm-6">
                  <select class="form-control" id="chartType">
  <option value="Cost">成本</option>
  <option value="Inventory">库存</option>
  <option value="Orders">订单</option>
</select>
                </div>
              </div>
            </form>
          </div>
          <div class="col-sm-9">
            <div id="groupChart" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel panel-default" id="grouppanel">
    <div class="panel-heading">团队</div>

    <table class="table" id="grouptable">
      <thead>
        <tr>
          <th id="groupRank">团队 #</th>
          <th>零售商</th>
          <th>批发商</th>
          <th>区域仓库</th>
          <th>工厂</th>
          <th></th>
        </tr>
      </thead>

      <tbody>
      </tbody>
    </table>
  </div>

  <div class="modal fade" id="myModal" tabindex="-1" role="dialog" data-backdrop="static" data-keyboard="false">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title">请输入管理员密码</h4>
        </div>
        <div class="modal-body">
          <p>请输入密码以访问管理后台。</p>
          <div class="alert alert-danger collapse" role="alert" id="wrongPassword">
            <span class="glyphicon glyphicon-exclamation-sign" aria-hidden="true"></span>
            <span class="sr-only">错误：</span> 密码错误，请重试。
          </div>
          <div class="input-group">
            <span class="input-group-addon" id="basic-addon1">
               <span class="glyphicon glyphicon-lock" aria-hidden="true"></span>
            </span>
            <input type="password" class="form-control" placeholder="密码" aria-describedby="basic-addon1" id="formPassword">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="btnAdmin">登录</button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
